name: .NET

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Fintech.InvestmentDemo.slnx

      - name: Build
        run: dotnet build Fintech.InvestmentDemo.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Fintech.Api.Tests/Fintech.Api.Tests.csproj --configuration Release --no-build
