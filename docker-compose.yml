name: fintech-investment-demo

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: investment_demo
      POSTGRES_USER: investment
      POSTGRES_PASSWORD: investment
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investment -d investment_demo"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__InvestmentDb: Host=postgres;Port=5432;Database=investment_demo;Username=investment;Password=investment
      Auth__Mode: Development
      Auth__Authority: http://keycloak:8080/realms/fintech-demo
      Auth__Audience: investment-api
      Cors__AllowedOrigins__0: http://localhost:8082
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Api__BaseUrl: http://api:8080/
    ports:
      - "8082:8080"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
